services:
  postgres:
    image: 'postgres:16'
    container_name: minu-postgres
    environment:
      - 'POSTGRES_DB=minu_db'
      - 'POSTGRES_PASSWORD=minu_secret'
      - 'POSTGRES_USER=minu_user'
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minu_user -d minu_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  minu-app:
    build: .
    container_name: minu-app
    environment:
      - 'SPRING_PROFILES_ACTIVE=docker'
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/minu_db'
      - 'SPRING_DATASOURCE_USERNAME=minu_user'
      - 'SPRING_DATASOURCE_PASSWORD=minu_secret'
    ports:
      - '8081:8080'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
