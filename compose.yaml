services:
  postgres:
    image: 'postgres:16'
    container_name: minu-postgres
    environment:
      - 'POSTGRES_DB=minu_db'
      - 'POSTGRES_PASSWORD=minu_secret'
      - 'POSTGRES_USER=minu_user'
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
