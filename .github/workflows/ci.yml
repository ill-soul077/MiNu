name: MiNu CI - Run Tests

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  test:
    name: Build & Test (Java 17 + H2)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 (Temurin distribution) ─────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── 3. Make mvnw executable
      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      # ── 4. Run all tests (unit + integration)

      - name: Run tests with Maven
        run: ./mvnw test --no-transfer-progress

      # ── 5. Upload Surefire test reports as artifact
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7
