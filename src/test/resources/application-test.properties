# H2 in-memory database (separate from dev)
spring.datasource.url=jdbc:h2:mem:minutest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Thymeleaf caching in tests
spring.thymeleaf.cache=false

# Suppress DataInitializer from running in tests
# (override with @TestPropertySource if needed per test class)
spring.autoconfigure.exclude=

# Faster BCrypt for tests (cost factor 4 instead of default 10)
spring.security.bcrypt.strength=4