spring:
  application:
    name: MiNu

  datasource:
    url: jdbc:postgresql://localhost:5433/minu_db
    username: minu_user
    password: minu_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


server:
  port: 8080
