<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('My Orders')}"></head>

<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="page-content">
    <div class="container">

        <div class="page-header">
            <h1>My Orders</h1>
            <p>Track and manage your purchase history</p>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(orders)}" class="empty-state">
            <span class="empty-icon">📦</span>
            <h3>No orders yet</h3>
            <p>You haven't placed any orders. Start shopping to see them here.</p>
            <a href="/products" class="btn btn-primary">Browse Products</a>
        </div>

        <!-- Orders -->
        <div th:if="${not #lists.isEmpty(orders)}" style="display:flex;flex-direction:column;gap:1rem;">

            <div th:each="order : ${orders}" class="card card-hover">
                <div class="flex-between" style="flex-wrap:wrap;gap:1rem;margin-bottom:1rem;">
                    <div>
                        <div style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:700;margin-bottom:0.3rem;">
                            Order #<span th:text="${order.id}">1</span>
                        </div>
                        <div style="font-size:0.85rem;color:var(--text-secondary);"
                             th:text="${#temporals.format(order.createdAt, 'MMMM d, yyyy')}">Date</div>
                    </div>
                    <div style="display:flex;align-items:center;gap:1rem;">
            <span th:class="'badge badge-' + ${#strings.toLowerCase(order.status)}"
                  th:text="${order.status}">PENDING</span>
                        <span style="font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--accent);"
                              th:text="'$' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}">$0.00</span>
                    </div>
                </div>

                <!-- Order items -->
                <div style="display:flex;flex-direction:column;gap:0.5rem;">
                    <div th:each="item : ${order.orderItems}"
                         style="display:flex;justify-content:space-between;align-items:center;padding:0.5rem 0;border-top:1px solid var(--border);font-size:0.875rem;">
                        <div>
                            <span style="color:var(--text-primary);font-weight:500;" th:text="${item.product.name}">Product</span>
                            <span style="color:var(--text-muted);margin-left:0.5rem;" th:text="'× ' + ${item.quantity}">× 1</span>
                        </div>
                        <span style="color:var(--text-secondary);"
                              th:text="'$' + ${#numbers.formatDecimal(item.priceAtPurchase * item.quantity, 1, 2)}">$0</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
