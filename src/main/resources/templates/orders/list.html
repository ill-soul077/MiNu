<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - MiNu Marketplace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <h2 class="mb-4">My Orders</h2>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <div th:if="${#lists.isEmpty(orders)}" class="alert alert-info">
        You haven't placed any orders yet. <a th:href="@{/products}">Browse products</a>
    </div>

    <div th:unless="${#lists.isEmpty(orders)}">
        <div class="card mb-3" th:each="order : ${orders}">
            <div class="card-header d-flex justify-content-between">
                <span>Order #<span th:text="${order.id}"></span></span>
                <span class="badge"
                      th:classappend="${order.status.name() == 'DELIVERED' ? 'bg-success' :
                                       (order.status.name() == 'CANCELLED' ? 'bg-danger' :
                                       (order.status.name() == 'SHIPPED' ? 'bg-info' : 'bg-warning'))}"
                      th:text="${order.status}"></span>
            </div>
            <div class="card-body">
                <table class="table table-sm">
                    <thead>
                    <tr>
                        <th>Product</th>
                        <th>Qty</th>
                        <th>Price</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${order.orderItems}">
                        <td th:text="${item.product.name}"></td>
                        <td th:text="${item.quantity}"></td>
                        <td>$<span th:text="${item.priceAtPurchase}"></span></td>
                    </tr>
                    </tbody>
                </table>
                <p class="mb-0"><strong>Total: $<span th:text="${order.totalAmount}"></span></strong></p>
                <small class="text-muted" th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></small>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
