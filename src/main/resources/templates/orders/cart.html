<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - MiNu Marketplace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <h2 class="mb-4">🛒 Shopping Cart</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${#lists.isEmpty(cartItems)}" class="alert alert-info">
        Your cart is empty. <a th:href="@{/products}">Browse products</a>
    </div>

    <div th:unless="${#lists.isEmpty(cartItems)}">
        <div class="table-responsive">
            <table class="table table-striped">
                <thead class="table-dark">
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Subtotal</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${cartItems}">
                    <td th:text="${item.product().name}"></td>
                    <td>$<span th:text="${item.product().price}"></span></td>
                    <td th:text="${item.quantity()}"></td>
                    <td>$<span th:text="${item.subtotal()}"></span></td>
                    <td>
                        <form th:action="@{/cart/remove}" method="post" class="d-inline">
                            <input type="hidden" name="productId" th:value="${item.product().id}">
                            <button type="submit" class="btn btn-danger btn-sm">Remove</button>
                        </form>
                    </td>
                </tr>
                </tbody>
                <tfoot>
                <tr class="table-info">
                    <td colspan="3"><strong>Total</strong></td>
                    <td colspan="2"><strong>$<span th:text="${total}"></span></strong></td>
                </tr>
                </tfoot>
            </table>
        </div>

        <form th:action="@{/orders/checkout}" method="post">
            <button type="submit" class="btn btn-primary btn-lg">Place Order</button>
        </form>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
