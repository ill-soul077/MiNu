<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Sign In')}"></head>

<body>
<div class="auth-wrapper">
    <div class="auth-card fade-in">
        <a href="/" class="auth-logo" style="display:block;text-decoration:none;">MiNu</a>
        <p class="auth-subtitle">Welcome back — sign in to continue</p>

        <div th:if="${param.error}" class="alert alert-danger">
            ✕ Invalid username or password. Please try again.
        </div>
        <div th:if="${param.registered}" class="alert alert-success">
            ✓ Account created! You can sign in once an admin verifies your account.
        </div>
        <div th:if="${param.logout}" class="alert alert-info">
            You have been signed out successfully.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" name="username"
                       class="form-control" placeholder="Enter your username"
                       required autocomplete="username"/>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password"
                       class="form-control" placeholder="Enter your password"
                       required autocomplete="current-password"/>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:0.5rem;">
                Sign In
            </button>
        </form>

        <div class="auth-divider">or</div>

        <p style="text-align:center;font-size:0.875rem;color:var(--text-secondary);">
            Don't have an account?
            <a href="/register" style="color:var(--accent);font-weight:600;"> Create one</a>
        </p>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
