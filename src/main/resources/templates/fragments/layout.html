<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ═══ NAVBAR FRAGMENT ═══ -->
<nav th:fragment="navbar" class="navbar">
    <a href="/" class="navbar-brand">Mi<span>Nu</span></a>

    <button class="nav-mobile-toggle" aria-label="Toggle menu">☰</button>

    <ul class="nav-links">
        <li><a href="/products">Shop</a></li>
        <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin/dashboard}">Admin</a></li>
        <li sec:authorize="hasRole('SELLER')"><a th:href="@{/seller/store}">My Store</a></li>

        <li sec:authorize="hasRole('CUSTOMER')">
            <a href="/cart" class="nav-cart-btn">
                🛒 Cart
                <span class="cart-badge" th:if="${cartCount != null and cartCount > 0}" th:text="${cartCount}">0</span>
            </a>
        </li>

        <li sec:authorize="!isAuthenticated()"><a href="/login">Sign In</a></li>
        <li sec:authorize="!isAuthenticated()"><a href="/register" class="btn-nav-auth">Get Started</a></li>

        <li sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post" class="inline-form">
                <button type="submit" class="btn btn-secondary btn-sm" style="cursor:pointer">Sign Out</button>
            </form>
        </li>
    </ul>
</nav>

<!-- ═══ ALERTS FRAGMENT ═══ -->
<div th:fragment="alerts">
    <div th:if="${message}" class="alert alert-success" data-auto-dismiss>
        ✓ <span th:text="${message}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger" data-auto-dismiss>
        ✕ <span th:text="${error}"></span>
    </div>
    <div th:if="${warning}" class="alert alert-warning" data-auto-dismiss>
        ⚠ <span th:text="${warning}"></span>
    </div>
</div>

<!-- ═══ FOOTER FRAGMENT ═══ -->
<footer th:fragment="footer" class="footer">
    <div class="container">
        <div class="grid grid-3" style="gap:2rem; padding-bottom:2rem;">
            <div>
                <div class="footer-brand">MiNu</div>
                <div class="footer-tagline">Premium marketplace for curated products</div>
            </div>
            <div>
                <div style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:0.75rem;font-weight:700;">Shop</div>
                <div style="display:flex;flex-direction:column;gap:0.4rem;">
                    <a href="/products" style="color:var(--text-secondary);font-size:0.875rem;">All Products</a>
                </div>
            </div>
            <div>
                <div style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:0.75rem;font-weight:700;">Account</div>
                <div style="display:flex;flex-direction:column;gap:0.4rem;">
                    <a href="/login" style="color:var(--text-secondary);font-size:0.875rem;" sec:authorize="!isAuthenticated()">Sign In</a>
                    <a href="/register" style="color:var(--text-secondary);font-size:0.875rem;" sec:authorize="!isAuthenticated()">Register</a>
                    <a href="/orders" style="color:var(--text-secondary);font-size:0.875rem;" sec:authorize="hasRole('CUSTOMER')">My Orders</a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <span>© 2025 MiNu Store. All rights reserved.</span>
            <span>Built with ♥</span>
        </div>
    </div>
</footer>

<!-- ═══ HEAD FRAGMENT ═══ -->
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' — MiNu Store'">MiNu Store</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍</text></svg>"/>
</head>

</html>
