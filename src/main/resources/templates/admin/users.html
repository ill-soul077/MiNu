<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - MiNu Marketplace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <h2 class="mb-4">User Management</h2>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
                <th>Verified</th>
                <th>Registered</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.username}"></td>
                <td th:text="${user.email}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${user.role.name() == 'ADMIN' ? 'bg-danger' : (user.role.name() == 'SELLER' ? 'bg-primary' : 'bg-success')}"
                          th:text="${user.role}"></span>
                </td>
                <td>
                    <span th:if="${user.verified}" class="badge bg-success">✓ Verified</span>
                    <span th:unless="${user.verified}" class="badge bg-warning text-dark">✗ Unverified</span>
                </td>
                <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd')}"></td>
                <td>
                    <div class="d-flex gap-1" th:if="${user.role.name() != 'ADMIN'}">
                        <form th:unless="${user.verified}" th:action="@{/admin/users/{id}/verify(id=${user.id})}" method="post">
                            <button type="submit" class="btn btn-success btn-sm">Verify</button>
                        </form>
                        <form th:unless="${user.verified}" th:action="@{/admin/users/{id}/reject(id=${user.id})}" method="post">
                            <button type="submit" class="btn btn-warning btn-sm"
                                    onclick="return confirm('Reject and remove this user?')">Reject</button>
                        </form>
                        <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post">
                            <button type="submit" class="btn btn-danger btn-sm"
                                    onclick="return confirm('Are you sure you want to delete this user? This will also delete their store and products.')">Delete</button>
                        </form>
                    </div>
                    <span th:if="${user.role.name() == 'ADMIN'}" class="text-muted">—</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
