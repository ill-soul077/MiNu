<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Users — Admin')}"></head>

<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="admin-layout">
    <div th:replace="~{admin/layout :: sidebar}"></div>

    <main class="admin-content">
        <div class="page-header">
            <h1>User Management</h1>
            <p>Verify, manage and control all platform users</p>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Joined</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="7" style="text-align:center;padding:3rem;color:var(--text-muted);">No users found</td>
                </tr>
                <tr th:each="user : ${users}">
                    <td style="color:var(--text-muted);font-size:0.8rem;">#<span th:text="${user.id}">1</span></td>
                    <td>
                        <span style="color:var(--text-primary);font-weight:600;"
                              th:text="${user.username}">username</span>
                    </td>
                    <td th:text="${user.email}">email</td>
                    <td>
                        <span class="tag" th:text="${user.role}">ROLE</span>
                    </td>
                    <td>
                        <span th:if="${user.verified}" class="badge badge-verified">✓ Verified</span>
                        <span th:unless="${user.verified}" class="badge badge-unverified">⏳ Pending</span>
                    </td>
                    <td style="font-size:0.82rem;"
                        th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'MMM d, yyyy') : '—'}">
                        Date
                    </td>
                    <td>
                        <div style="display:flex;gap:0.4rem;flex-wrap:wrap;">
                            <!-- Verify button (only for unverified non-admin) -->
                            <form th:if="${!user.verified and user.role.name() != 'ADMIN'}"
                                  th:action="@{/admin/users/{id}/verify(id=${user.id})}" method="post"
                                  class="inline-form">
                                <button type="submit" class="btn btn-success btn-sm">✓ Verify</button>
                            </form>
                            <!-- Reject button (only for unverified) -->
                            <form th:if="${!user.verified and user.role.name() != 'ADMIN'}"
                                  th:action="@{/admin/users/{id}/reject(id=${user.id})}" method="post"
                                  class="inline-form">
                                <button type="submit" class="btn btn-danger btn-sm"
                                        data-confirm="Reject and remove this user?">✕ Reject
                                </button>
                            </form>
                            <!-- Delete button (for verified, non-admin) -->
                            <form th:if="${user.verified and user.role.name() != 'ADMIN'}"
                                  th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post"
                                  class="inline-form">
                                <button type="submit" class="btn btn-danger btn-sm"
                                        data-confirm="Permanently delete this user?">Delete
                                </button>
                            </form>
                            <span th:if="${user.role.name() == 'ADMIN'}"
                                  style="font-size:0.78rem;color:var(--text-muted);">Protected</span>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
