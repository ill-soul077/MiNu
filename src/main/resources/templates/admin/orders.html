<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders - MiNu Marketplace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <h2 class="mb-4">Order Management</h2>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${#lists.isEmpty(orders)}" class="alert alert-info">
        No orders found.
    </div>

    <div class="table-responsive" th:unless="${#lists.isEmpty(orders)}">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Total</th>
                <th>Status</th>
                <th>Date</th>
                <th>Update Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}"></td>
                <td th:text="${order.customer.username}"></td>
                <td>$<span th:text="${order.totalAmount}"></span></td>
                <td>
                    <span class="badge"
                          th:classappend="${order.status.name() == 'DELIVERED' ? 'bg-success' :
                                           (order.status.name() == 'CANCELLED' ? 'bg-danger' :
                                           (order.status.name() == 'SHIPPED' ? 'bg-info' : 'bg-warning'))}"
                          th:text="${order.status}"></span>
                </td>
                <td th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                <td>
                    <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post" class="d-flex gap-1">
                        <select name="status" class="form-select form-select-sm" style="width: auto;">
                            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                                    th:selected="${s == order.status}"></option>
                        </select>
                        <button type="submit" class="btn btn-primary btn-sm">Update</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
