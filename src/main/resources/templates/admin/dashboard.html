<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Admin Dashboard')}"></head>

<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="admin-layout">
    <div th:replace="~{admin/layout :: sidebar}"></div>

    <main class="admin-content">
        <div class="page-header">
            <h1>Dashboard</h1>
            <p>Overview of your marketplace</p>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <!-- Stats Grid -->
        <div class="grid grid-4" style="margin-bottom:2.5rem;">
            <div class="stat-card accent fade-in fade-in-1">
                <span class="stat-icon">👥</span>
                <div class="stat-value" th:text="${userCount}">0</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card warning fade-in fade-in-2">
                <span class="stat-icon">⏳</span>
                <div class="stat-value" th:text="${unverifiedCount}">0</div>
                <div class="stat-label">Pending Verification</div>
            </div>
            <div class="stat-card info fade-in fade-in-3">
                <span class="stat-icon">🏪</span>
                <div class="stat-value" th:text="${storeCount}">0</div>
                <div class="stat-label">Active Stores</div>
            </div>
            <div class="stat-card success fade-in fade-in-4">
                <span class="stat-icon">🧾</span>
                <div class="stat-value" th:text="${orderCount}">0</div>
                <div class="stat-label">Total Orders</div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Quick Actions</h3>
            </div>
            <div style="display:flex;gap:1rem;flex-wrap:wrap;">
                <a th:href="@{/admin/users}" class="btn btn-secondary">
                    👥 Manage Users
                </a>
                <a th:href="@{/admin/orders}" class="btn btn-secondary">
                    🧾 View Orders
                </a>
                <a th:href="@{/admin/products}" class="btn btn-secondary">
                    📦 All Products
                </a>
                <a th:href="@{/admin/stores}" class="btn btn-secondary">
                    🏪 All Stores
                </a>
            </div>
        </div>

        <!-- Pending verification notice -->
        <div th:if="${unverifiedCount > 0}" class="alert alert-warning" style="margin-top:1.5rem;">
            ⚠ You have <strong th:text="${unverifiedCount}">0</strong> user(s) pending verification.
            <a th:href="@{/admin/users}" style="color:var(--warning);font-weight:700;margin-left:0.5rem;">Review now
                →</a>
        </div>
    </main>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
