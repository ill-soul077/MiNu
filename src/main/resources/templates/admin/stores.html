<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Stores — Admin')}"></head>

<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="admin-layout">
    <div th:replace="~{admin/layout :: sidebar}"></div>

    <main class="admin-content">
        <div class="page-header">
            <h1>Stores</h1>
            <p>All registered stores on the platform</p>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Store Name</th>
                    <th>Owner</th>
                    <th>Products</th>
                    <th>Description</th>
                    <th>Created</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(stores)}">
                    <td colspan="6" style="text-align:center;padding:3rem;color:var(--text-muted);">No stores yet</td>
                </tr>
                <tr th:each="store : ${stores}">
                    <td style="color:var(--text-muted);font-size:0.8rem;">#<span th:text="${store.id}">1</span></td>
                    <td>
                        <span style="color:var(--text-primary);font-weight:600;" th:text="${store.name}">Store</span>
                    </td>
                    <td th:text="${store.seller.username}">seller</td>
                    <td>
                        <span class="badge badge-info"
                              th:text="${#lists.size(store.products)} + ' items'">0 items</span>
                    </td>
                    <td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
                        th:text="${store.description ?: '—'}">—
                    </td>
                    <td style="font-size:0.82rem;"
                        th:text="${#temporals.format(store.createdAt, 'MMM d, yyyy')}">Date
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
