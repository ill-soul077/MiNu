<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head th:replace="~{fragments/layout :: head('Shop')}"></head>

  <body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="page-content">
      <div class="container">
        <!-- Page Header -->
        <div
          class="page-header flex-between"
          style="flex-wrap: wrap; gap: 1rem"
        >
          <div>
            <h1>The Collection</h1>
            <p>Discover curated products from verified sellers</p>
          </div>
          <!-- Search -->
          <form
            th:action="@{/products}"
            method="get"
            class="search-bar"
            style="width: 320px"
          >
            <div class="search-input-wrap">
              <span class="search-icon">🔍</span>
              <input
                type="text"
                name="search"
                class="form-control"
                placeholder="Search products..."
                th:value="${search}"
              />
            </div>
            <button type="submit" class="btn btn-primary">Search</button>
          </form>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <!-- Results count -->
        <div
          th:if="${search}"
          class="mb-2"
          style="color: var(--text-secondary); font-size: 0.9rem"
        >
          Showing results for "<strong
            th:text="${search}"
            style="color: var(--accent)"
          ></strong
          >" —
          <a href="/products" style="color: var(--text-muted)">clear search</a>
        </div>

        <!-- Product Grid -->
        <div th:if="${not #lists.isEmpty(products)}" class="product-grid">
          <div th:each="product : ${products}" class="product-card">
            <a
              th:href="@{/products/{id}(id=${product.id})}"
              style="text-decoration: none; color: inherit"
            >
              <div class="product-img-wrap">
                <img
                  th:if="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                  th:src="${product.imageUrl}"
                  th:alt="${product.name}"
                />
                <div
                  th:unless="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                  class="product-img-placeholder"
                >
                  🛍
                </div>
              </div>
            </a>
            <div class="product-body">
              <div class="product-store" th:text="${product.store.name}">
                Store Name
              </div>
              <a
                th:href="@{/products/{id}(id=${product.id})}"
                style="text-decoration: none"
              >
                <div class="product-name" th:text="${product.name}">
                  Product Name
                </div>
              </a>
              <div class="product-desc" th:text="${product.description}">
                Description
              </div>
              <div class="product-footer">
                <div>
                  <div
                    class="product-price"
                    th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}"
                  >
                    $0.00
                  </div>
                  <div
                    th:if="${product.stockQuantity > 0}"
                    class="product-stock"
                    th:text="${product.stockQuantity + ' in stock'}"
                  ></div>
                  <div
                    th:unless="${product.stockQuantity > 0}"
                    class="product-stock"
                    style="color: var(--danger)"
                  >
                    Out of stock
                  </div>
                </div>
                <div style="display: flex; gap: 0.5rem; align-items: center">
                  <a
                    th:href="@{/products/{id}(id=${product.id})}"
                    class="btn btn-secondary btn-sm"
                    >View</a
                  >
                  <form
                    th:if="${product.stockQuantity > 0}"
                    th:action="@{/cart/add}"
                    method="post"
                    sec:authorize="hasRole('CUSTOMER')"
                    style="display: inline"
                  >
                    <input
                      type="hidden"
                      name="productId"
                      th:value="${product.id}"
                    />
                    <input type="hidden" name="quantity" value="1" />
                    <button type="submit" class="btn btn-primary btn-sm">
                      Add
                    </button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Empty State -->
        <div th:if="${#lists.isEmpty(products)}" class="empty-state">
          <span class="empty-icon">🔍</span>
          <h3>No products found</h3>
          <p th:if="${search}">
            No results for "<span th:text="${search}"></span>". Try a different
            search.
          </p>
          <p th:unless="${search}">
            No products available yet. Check back soon!
          </p>
          <a th:if="${search}" href="/products" class="btn btn-primary"
            >View All Products</a
          >
        </div>
      </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script th:src="@{/js/main.js}"></script>
  </body>
</html>
