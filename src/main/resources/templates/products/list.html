<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - MiNu Marketplace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <h2 class="mb-4">Products</h2>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <!-- Search -->
    <form th:action="@{/products}" method="get" class="mb-4">
        <div class="input-group">
            <input type="text" class="form-control" name="search" placeholder="Search products..."
                   th:value="${search}">
            <button class="btn btn-outline-primary" type="submit">Search</button>
        </div>
    </form>

    <div th:if="${#lists.isEmpty(products)}" class="alert alert-info">
        No products found.
    </div>

    <div class="row">
        <div class="col-md-4 mb-4" th:each="product : ${products}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.name}">Product Name</h5>
                    <p class="card-text text-muted" th:text="${#strings.abbreviate(product.description, 100)}">Description</p>
                    <h4 class="text-primary">$<span th:text="${product.price}">0.00</span></h4>
                    <p class="text-muted">Stock: <span th:text="${product.stockQuantity}">0</span></p>
                </div>
                <div class="card-footer bg-white">
                    <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-outline-primary btn-sm">View Details</a>
                    <form th:action="@{/cart/add}" method="post" class="d-inline" sec:authorize="hasRole('CUSTOMER')">
                        <input type="hidden" name="productId" th:value="${product.id}">
                        <input type="hidden" name="quantity" value="1">
                        <button type="submit" class="btn btn-success btn-sm">Add to Cart</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
