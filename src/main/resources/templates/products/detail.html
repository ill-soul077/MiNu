<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail - MiNu Marketplace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h2 th:text="${product.name}">Product Name</h2>
                    <hr>
                    <p class="lead" th:text="${product.description}">Product description</p>
                    <h3 class="text-primary">$<span th:text="${product.price}">0.00</span></h3>
                    <p>Stock Available: <strong th:text="${product.stockQuantity}">0</strong></p>
                    <p class="text-muted">Store: <span th:text="${product.store.name}">Store Name</span></p>
                    <p class="text-muted">Seller: <span th:text="${product.store.seller.username}">seller</span></p>

                    <div class="mt-4">
                        <form th:action="@{/cart/add}" method="post" class="d-inline" sec:authorize="hasRole('CUSTOMER')">
                            <input type="hidden" name="productId" th:value="${product.id}">
                            <div class="input-group" style="max-width: 250px;">
                                <input type="number" class="form-control" name="quantity" value="1" min="1"
                                       th:max="${product.stockQuantity}">
                                <button type="submit" class="btn btn-success">Add to Cart</button>
                            </div>
                        </form>
                    </div>

                    <a th:href="@{/products}" class="btn btn-outline-secondary mt-3">← Back to Products</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
