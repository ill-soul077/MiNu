<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Error')}"></head>

<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="page-content">
    <div class="container" style="max-width:600px;text-align:center;padding:5rem 1rem;">

        <div style="font-size:4rem;margin-bottom:1rem;">⚠</div>

        <h1 style="font-size:1.5rem;margin-bottom:0.75rem;">
            <span th:if="${status == 404}">Page Not Found</span>
            <span th:if="${status == 403}">Access Denied</span>
            <span th:if="${status == 500}">Something Went Wrong</span>
            <span th:unless="${status == 404 or status == 403 or status == 500}">Unexpected Error</span>
        </h1>

        <p style="color:var(--text-secondary);margin-bottom:0.5rem;">
            <span th:if="${status == 404}">The page you're looking for doesn't exist or has been moved.</span>
            <span th:if="${status == 403}">You don't have permission to access this resource.</span>
            <span th:if="${status == 500}">An internal server error occurred. Please try again.</span>
            <span th:unless="${status == 404 or status == 403 or status == 500}">An unexpected error occurred.</span>
        </p>

        <p th:if="${message}"
           style="color:var(--danger);font-size:0.85rem;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);padding:0.75rem 1rem;border-radius:var(--radius-sm);margin-bottom:1.5rem;"
           th:text="${message}"></p>

        <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:2rem;">
            <a href="/" class="btn btn-primary">Go Home</a>
            <a href="/products" class="btn btn-secondary">Browse Products</a>
        </div>

    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
