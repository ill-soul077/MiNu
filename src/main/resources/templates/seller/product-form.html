<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Product Form')}"></head>

<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="admin-layout">
    <aside class="sidebar">
        <div class="sidebar-section-label">Seller Hub</div>
        <a th:href="@{/seller/store}" class="sidebar-link">
            <span class="sidebar-icon">🏪</span> My Store
        </a>
        <a th:href="@{/seller/products}" class="sidebar-link">
            <span class="sidebar-icon">📦</span> Products
        </a>
        <div class="sidebar-section-label">Account</div>
        <a href="/products" class="sidebar-link">
            <span class="sidebar-icon">🛍</span> Browse Shop
        </a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="sidebar-link"
                    style="background:none;border:none;width:100%;text-align:left;cursor:pointer;">
                <span class="sidebar-icon">↩</span> Sign Out
            </button>
        </form>
    </aside>

    <main class="admin-content">
        <div class="page-header">
            <h1 th:text="${product.id != null} ? 'Edit Product' : 'Add New Product'">Product</h1>
            <p th:text="${product.id != null} ? 'Update your product details' : 'Create a new product listing'">Form</p>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="card" style="max-width:640px;">
            <form th:action="${product.id != null} ? @{/seller/products/{id}/edit(id=${product.id})} : @{/seller/products}"
                  th:object="${product}" method="post">

                <div class="form-group">
                    <label class="form-label" for="name">Product Name *</label>
                    <input type="text" id="name" th:field="*{name}"
                           class="form-control" placeholder="e.g. Handcrafted Leather Wallet" required/>
                    <div th:if="${#fields.hasErrors('name')}" class="form-error">
                        ✕ <span th:errors="*{name}"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="description">Description</label>
                    <textarea id="description" th:field="*{description}"
                              class="form-control" rows="4"
                              placeholder="Describe your product in detail — materials, dimensions, special features..."></textarea>
                </div>

                <div class="grid grid-2" style="gap:1rem;">
                    <div class="form-group">
                        <label class="form-label" for="price">Price (USD) *</label>
                        <input type="number" id="price" th:field="*{price}"
                               class="form-control" placeholder="0.00"
                               step="0.01" min="0.01" required/>
                        <div th:if="${#fields.hasErrors('price')}" class="form-error">
                            ✕ <span th:errors="*{price}"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="stockQuantity">Stock Quantity *</label>
                        <input type="number" id="stockQuantity" th:field="*{stockQuantity}"
                               class="form-control" placeholder="0"
                               min="0" required/>
                        <div th:if="${#fields.hasErrors('stockQuantity')}" class="form-error">
                            ✕ <span th:errors="*{stockQuantity}"></span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="imageUrl">Image URL</label>
                    <input type="url" id="imageUrl" th:field="*{imageUrl}"
                           class="form-control" placeholder="https://example.com/image.jpg"/>
                    <div style="font-size:0.78rem;color:var(--text-muted);margin-top:0.35rem;">
                        Provide a direct URL to a product image (HTTPS recommended)
                    </div>
                </div>

                <!-- Image preview -->
                <div th:if="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                     style="margin-bottom:1.25rem;">
                    <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:0.5rem;">Current Image:</div>
                    <img th:src="${product.imageUrl}" alt="Product preview"
                         style="width:120px;height:120px;object-fit:cover;border-radius:var(--radius-sm);border:1px solid var(--border);"/>
                </div>

                <div style="display:flex;gap:0.75rem;flex-wrap:wrap;padding-top:0.5rem;">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <span th:text="${product.id != null} ? '✓ Save Changes' : '+ Create Product'">Submit</span>
                    </button>
                    <a th:href="@{/seller/products}" class="btn btn-secondary btn-lg">Cancel</a>
                </div>
            </form>
        </div>
    </main>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
