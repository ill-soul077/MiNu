<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Store Setup')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="page-content">
    <div class="container" style="max-width:520px;">
        <div th:replace="~{fragments/layout :: alerts}"></div>
        <div th:if="${error}" class="alert alert-warning">⚠ <span th:text="${error}"></span></div>
        <div class="card">
            <h2 style="margin-bottom:1.5rem;">Account Verification Required</h2>
            <p style="color:var(--text-secondary);margin-bottom:1rem;">Your seller account must be verified by an
                administrator before you can create a store.</p>
            <p style="color:var(--text-secondary);">Please check back after an admin reviews your account.</p>
        </div>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
