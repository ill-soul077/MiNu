<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Orders — Seller')}"></head>

<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="admin-layout">
    <aside class="sidebar">
        <div class="sidebar-section-label">Seller Hub</div>
        <a th:href="@{/seller/store}" class="sidebar-link">
            <span class="sidebar-icon">🏪</span> My Store
        </a>
        <a th:href="@{/seller/products}" class="sidebar-link">
            <span class="sidebar-icon">📦</span> Products
        </a>
        <a th:href="@{/seller/orders}" class="sidebar-link active">
            <span class="sidebar-icon">🧾</span> Orders
        </a>
        <div class="sidebar-section-label">Account</div>
        <a href="/products" class="sidebar-link">
            <span class="sidebar-icon">🛍</span> Browse Shop
        </a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="sidebar-link"
                    style="background:none;border:none;width:100%;text-align:left;cursor:pointer;">
                <span class="sidebar-icon">↩</span> Sign Out
            </button>
        </form>
    </aside>

    <main class="admin-content">
        <div class="page-header">
            <h1>Orders</h1>
            <p>Orders containing your products</p>
        </div>

        <div class="empty-state">
            <span class="empty-icon">🧾</span>
            <h3>Order tracking coming soon</h3>
            <p>This section will show all orders containing your products. Check back soon!</p>
            <a th:href="@{/seller/products}" class="btn btn-primary">Manage Products</a>
        </div>
    </main>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
