<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Products - MiNu Marketplace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>My Products</h2>
        <a th:if="${hasStore}" th:href="@{/seller/products/new}" class="btn btn-primary">+ Add New Product</a>
    </div>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:unless="${hasStore}" class="alert alert-warning">
        You need to <a th:href="@{/seller/store}">create a store</a> before adding products.
    </div>

    <div th:if="${#lists.isEmpty(products) and hasStore}" class="alert alert-info">
        You haven't listed any products yet.
    </div>

    <div class="table-responsive" th:unless="${#lists.isEmpty(products)}">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Created</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product : ${products}">
                <td th:text="${product.id}"></td>
                <td th:text="${product.name}"></td>
                <td>$<span th:text="${product.price}"></span></td>
                <td th:text="${product.stockQuantity}"></td>
                <td th:text="${#temporals.format(product.createdAt, 'yyyy-MM-dd')}"></td>
                <td>
                    <a th:href="@{/seller/products/{id}/edit(id=${product.id})}"
                       class="btn btn-warning btn-sm">Edit</a>
                    <form th:action="@{/seller/products/{id}/delete(id=${product.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-danger btn-sm"
                                onclick="return confirm('Are you sure?')">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
